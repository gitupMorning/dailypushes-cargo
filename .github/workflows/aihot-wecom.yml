name: AI HOT to WeCom

on:
  schedule:
    # 08:10 Beijing time = 00:10 UTC
    - cron: "10 0 * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Push AI HOT daily report
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python scripts/push_aihot_to_wecom.py
